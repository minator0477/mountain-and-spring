<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Visit</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>
  <div id="layer-switcher">
    <div id="search-box">
      <input type="text" id="search-input" placeholder="山・温泉を検索..." autocomplete="off">
      <div id="search-results"></div>
    </div>
    <div class="panel-section collapsed" id="basemap-section">
      <div class="panel-section-header">背景地図</div>
      <div class="panel-section-body">
        <div id="layer-buttons"></div>
      </div>
    </div>
    <div class="panel-section collapsed">
      <div class="panel-section-header">表示設定</div>
      <div class="panel-section-body">
        <div id="view-buttons"></div>
      </div>
    </div>
    <div class="panel-section collapsed">
      <div class="panel-section-header">データ</div>
      <div class="panel-section-body">
        <div id="data-buttons"></div>
      </div>
    </div>
  </div>
  <div id="legends">
    <div id="meizan-legend"></div>
    <div id="spring-legend"></div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
